# Blueprint de Render: crea el servicio web + la base de datos PostgreSQL.
# En Render: New → Blueprint → apunta a este repo y aplica.
databases:
  - name: circulo-db
    plan: free

services:
  - type: web
    name: circulo-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: circulo-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true          # Render genera una clave segura al azar
      - key: ADMIN_PIN
        value: "2026"                # cámbiala por la que quieras
      - key: PYTHON_VERSION
        value: "3.12.4"
